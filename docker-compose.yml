# Default local development stack. HFL source is bind-mounted with automatic process reload.
# SourceLens remains a separate image-only stack managed by dev/sourcelens.sh.
# Startup order: PostgreSQL/Redis, worker migrations, scheduler/API, UI, then Nginx.

name: hyperfilelens

x-backend-environment: &backend-environment
  TZ: UTC
  WATCHFILES_FORCE_POLLING: ${WATCHFILES_FORCE_POLLING:-true}

x-backend-volumes: &backend-volumes
  - ./src/backend:/opt/backend
  - ./deploy/bootstrap:/opt/bootstrap:ro
  - ./data/lang-packs:/opt/backend/lang-packs:ro
  - ./data/media:/opt/backend/media
  - ./data/staticfiles:/opt/backend/staticfiles
  - ./data/logs:/var/log/hyperfilelens

x-backend-image: &backend-image
  image: hyperfilelens-backend:dev
  pull_policy: never
  platform: linux/amd64
  env_file:
    - ./.env
  # Reach the WSL/host HTTP proxy (127.0.0.1:port) from containers via host.docker.internal
  extra_hosts:
    - "host.docker.internal:host-gateway"
  environment: *backend-environment
  volumes: *backend-volumes
  networks:
    - default
    - bridge

services:
  worker:
    <<: *backend-image
    build:
      context: .
      dockerfile: deploy/docker/backend.Dockerfile
      target: backend-development
      network: host
      args:
        APT_MIRROR: ${APT_MIRROR:-}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
        PIP_TIMEOUT: ${PIP_TIMEOUT:-600}
        KOPIA_DEB: ${KOPIA_DEB:-build/dependencies/kopia/kopia_linux_amd64.deb}
    environment:
      <<: *backend-environment
      LOG_FILE: /var/log/hyperfilelens/worker.log
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: worker-dev
    healthcheck:
      test: ["CMD-SHELL", "celery -A common inspect ping -t 2 >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"

  scheduler:
    <<: *backend-image
    environment:
      <<: *backend-environment
      LOG_FILE: /var/log/hyperfilelens/scheduler.log
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        condition: service_healthy
    command: scheduler-dev
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pgrep -f 'celery.* beat' >/dev/null && python -c \"import os,socket; pg_host=os.getenv('POSTGRES_HOST','postgres'); pg_port=int(os.getenv('POSTGRES_PORT','5432')); s=socket.socket(); s.settimeout(1); s.connect((pg_host,pg_port)); s.close(); s=socket.socket(); s.settimeout(1); s.connect(('redis',6379)); s.close(); print('ok')\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"

  api:
    <<: *backend-image
    environment:
      <<: *backend-environment
      LOG_FILE: /var/log/hyperfilelens/api.log
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        condition: service_healthy
      scheduler:
        condition: service_healthy
    command: api-dev
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8000/health >/dev/null && python -c \"import socket; s=socket.socket(); s.settimeout(1); s.connect(('127.0.0.1',8001)); s.close()\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"

  postgres:
    image: postgres:17
    pull_policy: never
    # Official PostgreSQL image; pin a distribution variant when required.
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-hyperfilelens}
    volumes:
      - ./data/postgresql:/var/lib/postgresql/data
    networks:
      default:
        aliases:
          - postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hyperfilelens} -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 3s
      retries: 30
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"

  redis:
    image: redis:alpine
    pull_policy: never
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h 127.0.0.1 -p 6379 ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 30
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"

  ui:
    image: hyperfilelens-frontend:dev
    pull_policy: never
    env_file:
      - ./.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    build:
      context: .
      dockerfile: deploy/docker/frontend.Dockerfile
      target: frontend-development
      network: host
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-}
    environment:
      TZ: UTC
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      VITE_DEV_API_TARGET: http://api:8000
      VITE_DEV_WEBSOCKET_TARGET: http://api:8001
      VITE_ENABLE_DEMO_DATA: ${VITE_ENABLE_DEMO_DATA:-false}
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./src/frontend:/app
      - frontend-node-modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/ >/dev/null 2>&1"]
      interval: 3s
      timeout: 3s
      retries: 40
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"

  nginx:
    image: nginx:stable-alpine
    pull_policy: never
    depends_on:
      api:
        condition: service_healthy
      ui:
        condition: service_healthy
    ports:
      - "${HFL_TENANT_BIND_ADDRESS:-0.0.0.0}:${HFL_TENANT_PORT:-11443}:443"
      - "${HFL_ADMIN_BIND_ADDRESS:-0.0.0.0}:${HFL_ADMIN_PORT:-11444}:10444"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/snippets:/etc/nginx/snippets:ro
      - ./deploy/nginx/development-spa-locations.conf:/etc/nginx/snippets/hfl-tenant-spa-locations.conf:ro
      - ./deploy/nginx/development-spa-locations.conf:/etc/nginx/snippets/hfl-ops-spa-locations.conf:ro
      - ./data/lang-packs:/opt/hyperfilelens/lang-packs:ro
      - ./data/media:/opt/backend/media:ro
      - ./data/staticfiles:/opt/django-static:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
      - ./data/logs:/var/log/hyperfilelens
    networks:
      - default
      - bridge
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "nginx -t >/dev/null 2>&1 && wget --no-check-certificate -qO- https://127.0.0.1/health >/dev/null && wget --no-check-certificate -qO- https://127.0.0.1/ >/dev/null",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"

networks:
  bridge:
    external: true
    name: hyperfilelens-bridge

volumes:
  frontend-node-modules:
