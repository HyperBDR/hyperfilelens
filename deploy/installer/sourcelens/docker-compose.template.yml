# SourceLens runtime stack template shared by HyperFileLens development and release packaging.
# tools/sourcelens/common.sh renders image references, ports, and optional embedded LensNode blocks.
name: hyperfilelens-sourcelens

services:
  api:
    image: __SOURCELENS_BACKEND_IMAGE__
    pull_policy: never
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      API_WORKERS: "1"
# HFL_EMBED_BACKEND_ENV_BEGIN
      LENSNODE_NAME: ${LENSNODE_NAME:-local-lensnode}
      LENSNODE_TOKEN: ${LENSNODE_TOKEN:-change-me-lensnode-token}
      LENSNODE_WORKSPACE_PATH: /workspace
# HFL_EMBED_BACKEND_ENV_END
    volumes:
      - ./data/django/staticfiles:/opt/backend/core/staticfiles
      - ./data/logs/api:/var/log/gunicorn
      - ./data/storage:/opt/storage
      - ./data/workspace:/workspace
      - ${SOURCELENS_TLS_CERT_DIR:-./deploy/nginx/certs}:/opt/certs:ro
    networks:
      sourcelens_network:
        aliases:
          - backend-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: gunicorn
    mem_limit: 384m
    cpus: 0.25
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  worker:
    image: __SOURCELENS_BACKEND_IMAGE__
    pull_policy: never
    restart: unless-stopped
    stop_grace_period: 120s
    env_file:
      - ./.env
    environment:
      CELERY_CONCURRENCY: "1"
    volumes:
      - ./data/logs/worker:/var/log/celery
      - ./data/storage:/opt/storage
      - ./data/workspace:/workspace
    networks:
      - sourcelens_network
    depends_on:
      api:
        condition: service_healthy
    command: celery
    mem_limit: 384m
    cpus: 0.30

  scheduler:
    image: __SOURCELENS_BACKEND_IMAGE__
    pull_policy: never
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - ./.env
    volumes:
      - ./data/logs/scheduler:/var/log/celery
    networks:
      - sourcelens_network
    depends_on:
      api:
        condition: service_healthy
    command: celery-beat
    mem_limit: 128m
    cpus: 0.10

  ui:
    image: __SOURCELENS_FRONTEND_IMAGE__
    pull_policy: never
    restart: unless-stopped
    expose:
      - "80"
    networks:
      sourcelens_network:
        aliases:
          - frontend
    mem_limit: 64m
    cpus: 0.05

# HFL_EMBED_LENSNODE_SERVICE_BEGIN
  local-lensnode:
    image: __SOURCELENS_LENSNODE_IMAGE__
    pull_policy: never
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      LENSNODE_CONTROL_WS_URL: ws://api:8000/ws/lens/lensnodes/
      LENSNODE_AI_GATEWAY_URL: http://api:8000/api/lens/lensnode/ai-gateway/
      LENSNODE_WORKSPACE_PATH: /workspace
    volumes:
      - ./data/workspace:/workspace
    networks:
      - sourcelens_network
    depends_on:
      api:
        condition: service_healthy
    mem_limit: 320m
    cpus: 0.20
# HFL_EMBED_LENSNODE_SERVICE_END

  nginx:
    image: hyperfilelens-sourcelens-nginx:stable-alpine
    pull_policy: never
    restart: unless-stopped
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ${SOURCELENS_TLS_CERT_DIR:-./deploy/nginx/certs}:/etc/nginx/certs:ro
      - ./data/django/staticfiles:/staticfiles:ro
      - ./data/storage:/opt/storage:ro
      - ./data/logs/nginx:/var/log/nginx
    ports:
      - "${SOURCELENS_CONSOLE_BIND_ADDRESS:-__SOURCELENS_CONSOLE_BIND_ADDRESS__}:${SOURCELENS_CONSOLE_PORT:-__SOURCELENS_CONSOLE_PORT__}:443"
    expose:
      - "80"
      - "443"
    networks:
      sourcelens_network:
      bridge:
        aliases:
          - sourcelens-nginx
    depends_on:
      api:
        condition: service_healthy
      ui:
        condition: service_started
    mem_limit: 64m
    cpus: 0.05

  postgres:
    image: hyperfilelens-postgres:17
    pull_policy: never
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sourcelens}
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - ./deploy/postgresql/initdb.d:/docker-entrypoint-initdb.d:ro
      - ./deploy/postgresql/etc/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./data/postgresql/data:/var/lib/postgresql/data
      - ./data/logs/postgresql:/var/log/postgresql
    entrypoint: ["bash", "-c", "mkdir -p /var/lib/postgresql/data /var/log/postgresql && chown postgres:postgres /var/lib/postgresql/data && chmod 700 /var/lib/postgresql/data && chown -R postgres:postgres /var/log/postgresql && chmod -R 755 /var/log/postgresql && exec docker-entrypoint.sh \"$$@\""]
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
    networks:
      sourcelens_network:
        aliases:
          - postgresql
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=\"$$POSTGRES_PASSWORD\" psql -h 127.0.0.1 -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\" -c 'SELECT 1' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 320m
    cpus: 0.20

  redis:
    image: hyperfilelens-redis:alpine
    pull_policy: never
    restart: unless-stopped
    command: redis-server
    volumes:
      - ./data/redis:/data
      - ./data/logs/redis:/var/log/redis
    networks:
      - sourcelens_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 128m
    cpus: 0.05

networks:
  sourcelens_network:
    driver: bridge
  bridge:
    external: true
    name: hyperfilelens-bridge
