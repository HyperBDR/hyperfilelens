# Shared gateway: tenant on :443, Platform Operations and Django Admin on :10444.
# Release uses the committed SPA snippets. Development replaces only those two
# include paths with deploy/nginx/development-spa-locations.conf.
include /etc/nginx/snippets/hfl-log-format.conf;
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    access_log /var/log/hyperfilelens/nginx-access.log hfl_access;
    error_log  /var/log/hyperfilelens/nginx-error.log warn;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;
    access_log /var/log/hyperfilelens/nginx-access.log hfl_access;
    error_log  /var/log/hyperfilelens/nginx-error.log warn;

    ssl_certificate     /etc/nginx/certs/tls.crt;
    ssl_certificate_key /etc/nginx/certs/tls.key;

    include /etc/nginx/snippets/hfl-tenant-locations.conf;
    include /etc/nginx/snippets/hfl-tenant-spa-locations.conf;
}

server {
    listen 10444 ssl;
    server_name _;
    # Keep the externally published admin port when redirecting / to Platform Ops.
    absolute_redirect off;
    access_log /var/log/hyperfilelens/nginx-access.log hfl_access;
    error_log  /var/log/hyperfilelens/nginx-error.log warn;

    ssl_certificate     /etc/nginx/certs/tls.crt;
    ssl_certificate_key /etc/nginx/certs/tls.key;

    include /etc/nginx/snippets/hfl-ops-locations.conf;
    include /etc/nginx/snippets/hfl-admin-locations.conf;

    location = / {
        return 302 /platform-ops/monitoring/host;
    }

    location = /platform-ops {
        return 302 /platform-ops/monitoring/host;
    }

    include /etc/nginx/snippets/hfl-ops-spa-locations.conf;
}
