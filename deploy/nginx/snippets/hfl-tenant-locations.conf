# Tenant-facing API, WebSocket, SourceLens, and bootstrap routes.

    # Copilot run SSE — disable buffering so tokens reach the browser incrementally
    location ~ ^/api/v1/lens/copilot/.+/stream/?$ {
        proxy_pass http://api:8000;
        include /etc/nginx/snippets/hfl-backend-proxy-headers.inc;
        proxy_http_version 1.1;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
        gzip off;
        chunked_transfer_encoding on;
    }

    location /api/ {
        proxy_pass http://api:8000;
        include /etc/nginx/snippets/hfl-backend-proxy-headers.inc;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /accounts/ {
        proxy_pass http://api:8000;
        include /etc/nginx/snippets/hfl-backend-proxy-headers.inc;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /ws/ {
        proxy_pass http://api:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        include /etc/nginx/snippets/hfl-backend-proxy-headers.inc;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_buffering off;
    }

    location ~ ^/(swagger|redoc|api/schema)(/.*)?$ {
        proxy_pass http://api:8000;
        include /etc/nginx/snippets/hfl-backend-proxy-headers.inc;
    }

    location /health {
        proxy_pass http://api:8000;
        include /etc/nginx/snippets/hfl-probe-proxy-headers.inc;
    }

    location /metrics {
        proxy_pass http://api:8000;
        include /etc/nginx/snippets/hfl-probe-proxy-headers.inc;
    }

    include /etc/nginx/snippets/hfl-sourcelens-locations.conf;

    location = /platform-ops {
        return 404;
    }

    location ^~ /platform-ops/ {
        return 404;
    }

    location = /admin {
        return 404;
    }

    location ^~ /admin/ {
        return 404;
    }

    location /media/enroll-bootstrap/ {
        alias /opt/backend/media/enroll-bootstrap/;
        autoindex off;
        add_header Cache-Control "public, max-age=3600";
    }

    location /media/gateway-bootstrap/ {
        alias /opt/backend/media/gateway-bootstrap/;
        autoindex off;
        add_header Cache-Control "public, max-age=3600";
    }

    include /etc/nginx/snippets/hfl-agent-release-locations.conf;
