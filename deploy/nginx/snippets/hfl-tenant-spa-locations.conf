# Tenant-facing production SPA routes.

    # Vite emits immutable, content-hashed files here. Do not send a missing
    # module request to the SPA fallback: browsers then receive index.html as
    # text/html and cannot report the real missing-resource condition.
    location ^~ /assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Optional language packs are mounted at runtime and contain JSON/static
    # catalogs only; they are not part of the frontend image.
    location ^~ /locales/ {
        alias /opt/hyperfilelens/lang-packs/;
        autoindex off;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # The SPA entry must be revalidated so a browser refresh after deployment
    # receives the current hashed asset manifest.
    location = /index.html {
        root /usr/share/nginx/html;
        try_files $uri =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
