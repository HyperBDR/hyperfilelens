# ① Observability (http context) — include once from default.conf.
#
# Unified access log line:
# [time] [level] [host:PID] [trace_id] [organization/user] [service(module:line)] - message

map $http_x_request_id $hfl_trace_id {
    ""       "-";
    ~^t-     $http_x_request_id;
    default  t-$http_x_request_id;
}

map $http_x_org_key $hfl_org_part {
    ""      "-";
    default org-$http_x_org_key;
}

map $http_x_user_id $hfl_user_part {
    ""      "-";
    default u-$http_x_user_id;
}

map $server_port $hfl_site {
    10444   ops;
    default tenant;
}

log_format hfl_access
    '[$time_iso8601] [INFO] [$hostname:$pid] [$hfl_trace_id] [$hfl_org_part/$hfl_user_part] '
    '[nginx(access)] - http request received: method=$request_method, uri=$request_uri, '
    'listen_port=$server_port, site=$hfl_site, client_ip=$remote_addr, status=$status';
