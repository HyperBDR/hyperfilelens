# SourceLens LensNode routes exposed through the tenant listener (server context).

    # LensNode traffic enters through HFL TLS and is re-encrypted to the
    # SourceLens Nginx service on the private bridge network.
    location = /sourcelens/health {
        set $sourcelens_upstream https://sourcelens-nginx:443;
        proxy_pass $sourcelens_upstream/health;
        proxy_ssl_server_name on;
        proxy_ssl_name localhost;
        proxy_ssl_verify off;
        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location /sourcelens/ws/lens/lensnodes/ {
        set $sourcelens_upstream https://sourcelens-nginx:443;
        rewrite ^/sourcelens(/.*)$ $1 break;
        proxy_pass $sourcelens_upstream;
        proxy_ssl_server_name on;
        proxy_ssl_name localhost;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 1h;
        proxy_buffering off;
    }

    location /sourcelens/api/lens/lensnode/ai-gateway/ {
        set $sourcelens_upstream https://sourcelens-nginx:443;
        rewrite ^/sourcelens(/.*)$ $1 break;
        proxy_pass $sourcelens_upstream;
        proxy_ssl_server_name on;
        proxy_ssl_name localhost;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_buffering off;
    }

    location = /sourcelens {
        return 404;
    }

    location /sourcelens/ {
        return 404;
    }
