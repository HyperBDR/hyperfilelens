# Protected Agent release downloads (server context).

    location /media/agent-releases/ {
        set $agent_release_original $request_uri;
        alias /opt/backend/media/agent-releases/;
        autoindex off;
        auth_request /_internal/agent-releases/auth;
        error_page 401 = @agent_releases_unauthorized;
    }

    location = /_internal/agent-releases/auth {
        internal;
        proxy_pass http://api:8000/api/v1/node/enrollment/agent-releases/auth$is_args$args;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-HFL-Site-Role $hfl_site;
        proxy_set_header X-Original-URI $agent_release_original;
    }

    location @agent_releases_unauthorized {
        return 401;
    }
