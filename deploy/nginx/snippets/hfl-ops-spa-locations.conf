# Platform Operations production SPA routes.

    location ^~ /assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon.svg {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    location ^~ /locales/ {
        alias /opt/hyperfilelens/lang-packs/;
        autoindex off;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location ^~ /cloud-platforms/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    location = /index.html {
        root /usr/share/nginx/html;
        try_files $uri =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location = /login {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    location ^~ /auth/ {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    location ^~ /platform-ops/ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location / {
        return 404;
    }
