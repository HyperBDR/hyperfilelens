# Ops / break-glass routes (server context) — Django Admin + collectstatic assets.
# Include only on listeners that expose /admin/ (standalone :443/:10444, SaaS :10444).

    location /static/ {
        alias /opt/django-static/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /admin/ {
        proxy_pass http://api:8000;
        include /etc/nginx/snippets/hfl-backend-proxy-headers.inc;
    }
