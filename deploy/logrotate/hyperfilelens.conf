# Nginx / API / Worker / Scheduler — rotated inside the frontend (nginx) container.
# Bind-mount host data/logs → /var/log/hyperfilelens (shared with backend containers).
# Multiple frontend replicas: flock on .logrotate.lock ensures one rotator per cycle;
# .logrotate.status on the shared mount keeps rotation state consistent.
# Policy: daily OR 500M; rotate 30; no compression.
/var/log/hyperfilelens/*.log {
    daily
    size 500M
    missingok
    rotate 30
    notifempty
    copytruncate
    create 0640 root root
}
