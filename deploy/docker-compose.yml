# Image-only production stack template. Release packaging copies this file to the package root.
# Worker, scheduler, and API share the hyperfilelens-backend image and use separate commands.
# Startup order: PostgreSQL/Redis, worker migrations and Celery, scheduler, API, then Nginx.
# The hyperfilelens-frontend image serves the prebuilt SPA through Nginx.

name: hyperfilelens

x-backend-image: &backend-image
  image: hyperfilelens-backend:${APP_VERSION:-latest}
  platform: linux/amd64
  env_file:
    - ./.env
  # Reach the WSL/host HTTP proxy (127.0.0.1:port) from containers via host.docker.internal
  extra_hosts:
    - "host.docker.internal:host-gateway"
  environment:
    TZ: UTC
  networks:
    - default
    - bridge

services:
  worker:
    <<: *backend-image
    environment:
      TZ: UTC
      LOG_FILE: /var/log/hyperfilelens/worker.log
    volumes:
      - ./data/lang-packs:/opt/backend/lang-packs:ro
      - ./data/media:/opt/backend/media
      - ./data/staticfiles:/opt/backend/staticfiles
      - ./data/logs:/var/log/hyperfilelens
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: worker
    mem_limit: 320m
    cpus: 0.30
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "tr '\\0' ' ' </proc/1/cmdline | grep -Eq 'celery .*worker' && python -c \"import os,socket; pg_host=os.getenv('POSTGRES_HOST','postgres'); pg_port=int(os.getenv('POSTGRES_PORT','5432')); s=socket.socket(); s.settimeout(1); s.connect((pg_host,pg_port)); s.close(); s=socket.socket(); s.settimeout(1); s.connect(('redis',6379)); s.close()\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"

  scheduler:
    <<: *backend-image
    environment:
      TZ: UTC
      LOG_FILE: /var/log/hyperfilelens/scheduler.log
    volumes:
      - ./data/lang-packs:/opt/backend/lang-packs:ro
      - ./data/media:/opt/backend/media
      - ./data/staticfiles:/opt/backend/staticfiles
      - ./data/logs:/var/log/hyperfilelens
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        condition: service_healthy
    command: scheduler
    mem_limit: 128m
    cpus: 0.10
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pgrep -f 'celery.* beat' >/dev/null && python -c \"import os,socket; pg_host=os.getenv('POSTGRES_HOST','postgres'); pg_port=int(os.getenv('POSTGRES_PORT','5432')); s=socket.socket(); s.settimeout(1); s.connect((pg_host,pg_port)); s.close(); s=socket.socket(); s.settimeout(1); s.connect(('redis',6379)); s.close(); print('ok')\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"

  api:
    <<: *backend-image
    environment:
      TZ: UTC
      LOG_FILE: /var/log/hyperfilelens/api.log
      API_WORKERS: "1"
    volumes:
      - ./data/lang-packs:/opt/backend/lang-packs:ro
      - ./data/media:/opt/backend/media
      - ./data/staticfiles:/opt/backend/staticfiles
      - ./data/logs:/var/log/hyperfilelens
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        condition: service_healthy
      scheduler:
        condition: service_healthy
    command: api
    mem_limit: 448m
    cpus: 0.30
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8000/health >/dev/null && python -c \"import socket; s=socket.socket(); s.settimeout(1); s.connect(('127.0.0.1',8001)); s.close()\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"

  postgres:
    image: hyperfilelens-postgres:17
    # Official PostgreSQL image; pin a distribution variant when required.
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-hyperfilelens}
    volumes:
      - ./data/postgresql:/var/lib/postgresql/data
    networks:
      default:
        aliases:
          - postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hyperfilelens} -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 3s
      retries: 30
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    mem_limit: 320m
    cpus: 0.15

  redis:
    image: hyperfilelens-redis:alpine
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h 127.0.0.1 -p 6379 ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 30
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    mem_limit: 128m
    cpus: 0.05

  nginx:
    image: hyperfilelens-frontend:${APP_VERSION:-latest}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: UTC
      LOGROTATE_INTERVAL_SECONDS: "3600"
      LOGROTATE_STATE: /var/log/hyperfilelens/.logrotate.status
      LOGROTATE_LOCK: /var/log/hyperfilelens/.logrotate.lock
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${HFL_TENANT_BIND_ADDRESS:-0.0.0.0}:${HFL_TENANT_PORT:-11443}:443"
      - "${HFL_ADMIN_BIND_ADDRESS:-0.0.0.0}:${HFL_ADMIN_PORT:-11444}:10444"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/snippets:/etc/nginx/snippets:ro
      - ./data/lang-packs:/opt/hyperfilelens/lang-packs:ro
      - ./data/media:/opt/backend/media:ro
      - ./data/staticfiles:/opt/django-static:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
      - ./data/logs:/var/log/hyperfilelens
      - ./deploy/logrotate/hyperfilelens.conf:/etc/logrotate.d/hyperfilelens:ro
    networks:
      - default
      - bridge
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -f /usr/share/nginx/html/index.html && nginx -t >/dev/null 2>&1 && wget --no-check-certificate -qO- https://127.0.0.1/health >/dev/null",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    mem_limit: 64m
    cpus: 0.10

networks:
  bridge:
    external: true
    name: hyperfilelens-bridge
