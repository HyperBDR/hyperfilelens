name: HFL - Target Deployment (Reusable)

on:
  workflow_call:
    inputs:
      tag:
        description: Published HFL release tag to deploy
        required: true
        type: string
      public_url:
        description: Optional canonical HFL browser URL
        required: false
        default: ''
        type: string
      ssh_host:
        description: SSH deployment hostname or IP address
        required: true
        type: string
      ssh_port:
        description: SSH deployment port
        required: true
        type: string
      ssh_user:
        description: SSH deployment user
        required: true
        type: string
      ssh_known_hosts:
        description: Verified SSH known_hosts entries
        required: true
        type: string
      turnstile_site_key:
        description: Public Cloudflare Turnstile site key
        required: false
        default: ''
        type: string
      turnstile_enabled:
        description: Require Turnstile on the SaaS deployment target
        required: true
        type: boolean
      platform_gateway_auto_deploy:
        description: Automatically deploy an HFL-managed local platform Gateway
        required: false
        default: false
        type: boolean
      smtp_host:
        description: Optional SMTP server hostname; configure all SMTP inputs together
        required: false
        default: ''
        type: string
      smtp_port:
        description: Optional SMTP server port
        required: false
        default: ''
        type: string
      smtp_username:
        description: Optional SMTP account username
        required: false
        default: ''
        type: string
      smtp_security:
        description: Optional SMTP transport security (ssl, starttls, or none)
        required: false
        default: ''
        type: string
      email_from:
        description: Optional sender identity for outbound email
        required: false
        default: ''
        type: string
      ai_model_provider:
        description: Optional deployment-managed SourceLens model provider
        required: false
        default: ''
        type: string
      ai_model_id:
        description: Optional deployment-managed SourceLens model identifier
        required: false
        default: ''
        type: string
      ai_model_display_name:
        description: Optional deployment-managed model display name
        required: false
        default: ''
        type: string
    secrets:
      ssh_private_key:
        description: SSH private key for the deployment target
        required: true
      turnstile_secret_key:
        description: Private Cloudflare Turnstile verification key
        required: false
      smtp_password:
        description: Optional SMTP account password
        required: false
      ai_model_api_base:
        description: Optional HTTPS API base for the deployment-managed model
        required: false
      ai_model_api_key:
        description: Optional API key for the deployment-managed model
        required: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      APP_PUBLIC_URL: ${{ inputs.public_url }}
      DEPLOY_SSH_HOST: ${{ inputs.ssh_host }}
      DEPLOY_SSH_PORT: ${{ inputs.ssh_port }}
      DEPLOY_SSH_USER: ${{ inputs.ssh_user }}
      DEPLOY_SSH_KNOWN_HOSTS: ${{ inputs.ssh_known_hosts }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate deployment configuration
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.ssh_private_key }}
          SMTP_HOST: ${{ inputs.smtp_host }}
          SMTP_PORT: ${{ inputs.smtp_port }}
          SMTP_USERNAME: ${{ inputs.smtp_username }}
          SMTP_PASSWORD: ${{ secrets.smtp_password }}
          SMTP_SECURITY: ${{ inputs.smtp_security }}
          EMAIL_FROM: ${{ inputs.email_from }}
          AI_MODEL_PROVIDER: ${{ inputs.ai_model_provider }}
          AI_MODEL_ID: ${{ inputs.ai_model_id }}
          AI_MODEL_DISPLAY_NAME: ${{ inputs.ai_model_display_name }}
          AI_MODEL_API_BASE: ${{ secrets.ai_model_api_base }}
          AI_MODEL_API_KEY: ${{ secrets.ai_model_api_key }}
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "$DEPLOY_SSH_HOST" && "$DEPLOY_SSH_HOST" != *[[:space:]]* ]]
          [[ "$DEPLOY_SSH_PORT" =~ ^[0-9]+$ ]]
          [[ "$DEPLOY_SSH_USER" =~ ^[a-z_][a-z0-9_-]*$ ]]
          [[ -n "$DEPLOY_SSH_KNOWN_HOSTS" ]]
          [[ -n "$DEPLOY_SSH_PRIVATE_KEY" ]]

          smtp_values=(
            "$SMTP_HOST" "$SMTP_PORT" "$SMTP_USERNAME"
            "$SMTP_PASSWORD" "$SMTP_SECURITY" "$EMAIL_FROM"
          )
          smtp_configured=0
          for value in "${smtp_values[@]}"; do
            [[ -z "$value" ]] || smtp_configured=$((smtp_configured + 1))
          done
          if (( smtp_configured != 0 && smtp_configured != ${#smtp_values[@]} )); then
            echo 'SMTP deployment configuration is partial; configure all SMTP variables and the password secret, or leave all of them empty' >&2
            exit 1
          fi
          if (( smtp_configured > 0 )); then
            [[ "$SMTP_HOST" != *[[:space:]]* ]]
            [[ "$SMTP_PORT" =~ ^[0-9]+$ ]] && (( SMTP_PORT >= 1 && SMTP_PORT <= 65535 ))
            [[ "$SMTP_SECURITY" =~ ^(ssl|starttls|none)$ ]]
            [[ "$SMTP_PASSWORD" != *$'\n'* && "$SMTP_PASSWORD" != *$'\r'* ]]
          fi

          ai_model_values=(
            "$AI_MODEL_PROVIDER" "$AI_MODEL_ID" "$AI_MODEL_DISPLAY_NAME"
            "$AI_MODEL_API_BASE" "$AI_MODEL_API_KEY"
          )
          ai_model_configured=0
          for value in "${ai_model_values[@]}"; do
            [[ -z "$value" ]] || ai_model_configured=$((ai_model_configured + 1))
          done
          if (( ai_model_configured != 0 && ai_model_configured != ${#ai_model_values[@]} )); then
            echo 'AI model deployment configuration is partial; configure all AI model variables and secrets, or leave all of them empty' >&2
            exit 1
          fi
          if (( ai_model_configured > 0 )); then
            [[ "$AI_MODEL_PROVIDER" =~ ^[a-z0-9_]+$ ]]
            [[ "$AI_MODEL_ID" != *$'\n'* && "$AI_MODEL_ID" != *$'\r'* ]]
            [[ "$AI_MODEL_DISPLAY_NAME" != *$'\n'* && "$AI_MODEL_DISPLAY_NAME" != *$'\r'* ]]
            [[ "$AI_MODEL_API_BASE" == https://* ]]
            [[ "$AI_MODEL_API_BASE" != *$'\n'* && "$AI_MODEL_API_BASE" != *$'\r'* ]]
            [[ "$AI_MODEL_API_KEY" != *$'\n'* && "$AI_MODEL_API_KEY" != *$'\r'* ]]
          fi

      - name: Install SSH credentials
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.ssh_private_key }}
        shell: bash
        run: |
          set -euo pipefail
          install -d -m 0700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/hyperfilelens_deploy
          printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 0600 ~/.ssh/hyperfilelens_deploy ~/.ssh/known_hosts

      - name: Stage runtime configuration
        env:
          HFL_PLATFORM_GATEWAY_AUTO_DEPLOY: ${{ inputs.platform_gateway_auto_deploy }}
          TURNSTILE_SITE_KEY: ${{ inputs.turnstile_site_key }}
          TURNSTILE_SECRET_KEY: ${{ secrets.turnstile_secret_key }}
          TURNSTILE_ENABLED: ${{ inputs.turnstile_enabled }}
          SMTP_HOST: ${{ inputs.smtp_host }}
          SMTP_PORT: ${{ inputs.smtp_port }}
          SMTP_USERNAME: ${{ inputs.smtp_username }}
          SMTP_PASSWORD: ${{ secrets.smtp_password }}
          SMTP_SECURITY: ${{ inputs.smtp_security }}
          EMAIL_FROM: ${{ inputs.email_from }}
        shell: bash
        run: |
          set -euo pipefail
          runtime_env="$RUNNER_TEMP/hyperfilelens-runtime.env"
          trap 'rm -f -- "$runtime_env"' EXIT
          umask 077
          printf '%s\n' \
            "HFL_EMAIL_SIGNUP_ENABLED=false" \
            "HFL_INSECURE_TLS=0" \
            "HFL_PLATFORM_GATEWAY_AUTO_DEPLOY=$HFL_PLATFORM_GATEWAY_AUTO_DEPLOY" \
            "TURNSTILE_ENABLED=$TURNSTILE_ENABLED" \
            "TURNSTILE_SITE_KEY=$TURNSTILE_SITE_KEY" \
            "TURNSTILE_SECRET_KEY=$TURNSTILE_SECRET_KEY" \
            "SMTP_HOST=$SMTP_HOST" \
            "SMTP_PORT=$SMTP_PORT" \
            "SMTP_USERNAME=$SMTP_USERNAME" \
            "SMTP_PASSWORD=$SMTP_PASSWORD" \
            "SMTP_SECURITY=$SMTP_SECURITY" \
            "EMAIL_FROM=$EMAIL_FROM" \
            > "$runtime_env"
          ssh -i ~/.ssh/hyperfilelens_deploy \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o TCPKeepAlive=yes \
            -p "$DEPLOY_SSH_PORT" \
            "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST" \
            "umask 077 && cat > /var/tmp/hyperfilelens-runtime-${GITHUB_RUN_ID}.env && chmod 0600 /var/tmp/hyperfilelens-runtime-${GITHUB_RUN_ID}.env" \
            < "$runtime_env"

      - name: Download and deploy the complete release package on the host
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/hyperfilelens_deploy \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o TCPKeepAlive=yes \
            -p "$DEPLOY_SSH_PORT" \
            "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST" \
            bash -s -- \
              --tag "${{ inputs.tag }}" \
              --public-url "$APP_PUBLIC_URL" \
              --direct-host "$DEPLOY_SSH_HOST" \
              --install-dir /opt/hyperfilelens \
              --runtime-env-file "/var/tmp/hyperfilelens-runtime-${GITHUB_RUN_ID}.env" \
            < .github/scripts/remote-deploy.sh

      - name: Remove staged runtime configuration
        if: ${{ always() }}
        shell: bash
        run: |
          if [[ -f ~/.ssh/hyperfilelens_deploy ]]; then
            ssh -i ~/.ssh/hyperfilelens_deploy \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=20 \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=20 \
              -o TCPKeepAlive=yes \
              -p "$DEPLOY_SSH_PORT" \
              "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST" \
              rm -f -- "/var/tmp/hyperfilelens-runtime-${GITHUB_RUN_ID}.env"
          fi

      - name: Post-deploy internal health checks
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/hyperfilelens_deploy \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o TCPKeepAlive=yes \
            -p "$DEPLOY_SSH_PORT" \
            "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST" \
            'curl -kfsS https://127.0.0.1:11443/health/ready >/dev/null && curl -kfsS https://127.0.0.1:11444/ >/dev/null && curl -kfsS https://127.0.0.1:11445/ >/dev/null'

      - name: Apply deployment-managed AI model
        env:
          AI_MODEL_PROVIDER: ${{ inputs.ai_model_provider }}
          AI_MODEL_ID: ${{ inputs.ai_model_id }}
          AI_MODEL_DISPLAY_NAME: ${{ inputs.ai_model_display_name }}
          AI_MODEL_API_BASE: ${{ secrets.ai_model_api_base }}
          AI_MODEL_API_KEY: ${{ secrets.ai_model_api_key }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$AI_MODEL_PROVIDER" ]]; then
            printf '### AI model deployment\n\nSkipped: deployment-managed AI model is not configured.\n' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          payload="$RUNNER_TEMP/hyperfilelens-ai-model.json"
          trap 'rm -f -- "$payload"' EXIT
          umask 077
          python3 - "$payload" <<'PY'
          import json
          import os
          import pathlib
          import sys

          payload = {
              "provider": os.environ["AI_MODEL_PROVIDER"],
              "model_id": os.environ["AI_MODEL_ID"],
              "display_name": os.environ["AI_MODEL_DISPLAY_NAME"],
              "api_base": os.environ["AI_MODEL_API_BASE"],
              "api_key": os.environ["AI_MODEL_API_KEY"],
          }
          pathlib.Path(sys.argv[1]).write_text(json.dumps(payload), encoding="utf-8")
          PY
          chmod 0600 "$payload"

          set +e
          output="$(ssh -i ~/.ssh/hyperfilelens_deploy \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o TCPKeepAlive=yes \
            -p "$DEPLOY_SSH_PORT" \
            "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST" \
            'cd /opt/hyperfilelens && docker compose exec -T api python manage.py ensure_platform_ai_model' \
            < "$payload" 2>&1)"
          command_status=$?
          set -e
          printf '%s\n' "$output"
          if (( command_status != 0 )); then
            echo '::warning title=AI model deployment::Unable to apply the deployment-managed model; core deployment remains healthy.'
            printf '### AI model deployment\n\nWarning: model configuration could not be applied. Core deployment remains healthy.\n' >> "$GITHUB_STEP_SUMMARY"
          elif grep -F 'HFL_AI_MODEL_CONNECTIVITY=failed' <<<"$output" >/dev/null; then
            echo '::warning title=AI model connectivity::The model was saved, but its connectivity test failed.'
            printf '### AI model deployment\n\nWarning: model configuration was applied, but the connectivity test failed.\n' >> "$GITHUB_STEP_SUMMARY"
          else
            printf '### AI model deployment\n\nPassed: deployment-managed model was applied and tested successfully.\n' >> "$GITHUB_STEP_SUMMARY"
          fi
          exit 0

      - name: Optional public endpoint check
        shell: bash
        run: |
          set +e
          if [[ -z "$APP_PUBLIC_URL" ]]; then
            echo '::warning::Public URL is not configured; skipping external availability check'
            printf '### Public endpoint check\n\nSkipped: `PROD_PUBLIC_URL`/`PREPROD_PUBLIC_URL` is empty. Core deployment is healthy.\n' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          endpoint="${APP_PUBLIC_URL%/}/health/ready"
          if ! curl -fsS --connect-timeout 10 --max-time 30 --retry 2 "$endpoint" >/dev/null; then
            echo "::warning::Public endpoint is not ready: $endpoint"
            printf '### Public endpoint check\n\nWarning: `%s` is not ready. Core deployment and host-local checks passed.\n' "$endpoint" >> "$GITHUB_STEP_SUMMARY"
          else
            printf '### Public endpoint check\n\nPassed: `%s`\n' "$endpoint" >> "$GITHUB_STEP_SUMMARY"
          fi
          exit 0
