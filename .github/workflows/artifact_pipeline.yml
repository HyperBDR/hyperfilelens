name: HFL - Artifact Pipeline (Reusable)

on:
  workflow_call:
    inputs:
      channel:
        description: Artifact channel requested by a trusted wrapper
        required: true
        type: string
      force_rebuild:
        description: Rebuild an already-published Main commit
        required: false
        default: false
        type: boolean

concurrency:
  group: hyperfilelens-${{ inputs.channel == 'main' && 'main' || 'release' }}
  # Main is a moving development target, while formal release builds must
  # always run to completion once a version tag has been accepted.
  cancel-in-progress: ${{ inputs.channel == 'main' }}

permissions:
  contents: read

env:
  REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
  REGISTRY_NAMESPACE: ${{ vars.REGISTRY_NAMESPACE }}
  REGISTRY_PREFIX: ${{ format('{0}/{1}', vars.REGISTRY_HOST, vars.REGISTRY_NAMESPACE) }}

jobs:
  prepare:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      commit: ${{ steps.version.outputs.commit }}
      channel: ${{ steps.version.outputs.channel }}
      build_required: ${{ steps.candidate.outputs.build_required }}
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          fetch-depth: 0

      - name: Validate release tag and commit
        id: version
        env:
          REQUESTED_CHANNEL: ${{ inputs.channel }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --no-tags
          case "$REQUESTED_CHANNEL" in
            release)
              TAG="${GITHUB_REF_NAME}"
              [[ "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]
              VERSION="${BASH_REMATCH[1]}"
              ;;
            main)
              [[ "$GITHUB_REF" == "refs/heads/main" ]]
              [[ "$GITHUB_SHA" =~ ^[0-9a-f]{40}$ ]]
              TAG="main-${GITHUB_SHA:0:7}"
              VERSION="$TAG"
              ;;
            *)
              echo "unsupported artifact channel: $REQUESTED_CHANNEL" >&2
              exit 2
              ;;
          esac
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          {
            echo "version=$VERSION"
            echo "tag=$TAG"
            echo "commit=$GITHUB_SHA"
            echo "channel=$REQUESTED_CHANNEL"
          } >> "$GITHUB_OUTPUT"
          [[ "${REGISTRY_HOST}" =~ ^[a-z0-9][a-z0-9.-]*(:[0-9]+)?$ ]] || {
            echo "REGISTRY_HOST repository variable is missing or invalid" >&2
            exit 1
          }
          [[ "${REGISTRY_NAMESPACE}" =~ ^[a-z0-9][a-z0-9._/-]*$ && "${REGISTRY_NAMESPACE}" != */ && "${REGISTRY_NAMESPACE}" != *//* ]] || {
            echo "REGISTRY_NAMESPACE repository variable is missing or invalid" >&2
            exit 1
          }

      - name: Create or reuse build candidate
        id: candidate
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_CHANNEL: ${{ steps.version.outputs.channel }}
          ARTIFACT_ID: ${{ steps.version.outputs.tag }}
          FORCE_REBUILD: ${{ inputs.force_rebuild }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$ARTIFACT_CHANNEL" == "main" ]] \
            && existing_commit="$(git rev-parse --verify "${ARTIFACT_ID}^{commit}" 2>/dev/null)"; then
            [[ "$existing_commit" == "$GITHUB_SHA" ]] || {
              echo "Main artifact ID collision: $ARTIFACT_ID already identifies $existing_commit" >&2
              exit 1
            }
          fi
          if gh release view "$ARTIFACT_ID" --json isDraft,isPrerelease >/tmp/hfl-release.json 2>/dev/null; then
            if [[ "$ARTIFACT_CHANNEL" == "release" ]]; then
              [[ "$(jq -r .isDraft /tmp/hfl-release.json)" == "true" ]] || {
                echo "Refusing to overwrite an already-published release" >&2
                exit 1
              }
              echo "build_required=true" >> "$GITHUB_OUTPUT"
            elif [[ "$FORCE_REBUILD" == "true" ]]; then
              gh release delete "$ARTIFACT_ID" --cleanup-tag --yes
              gh release create "$ARTIFACT_ID" \
                --target "$GITHUB_SHA" \
                --draft \
                --prerelease \
                --title "Main ${GITHUB_SHA:0:7}"
              echo "build_required=true" >> "$GITHUB_OUTPUT"
            elif [[ "$(jq -r .isDraft /tmp/hfl-release.json)" == "true" ]]; then
              echo "build_required=true" >> "$GITHUB_OUTPUT"
            else
              [[ "$(jq -r .isPrerelease /tmp/hfl-release.json)" == "true" ]]
              echo "build_required=false" >> "$GITHUB_OUTPUT"
            fi
          else
            if [[ "$ARTIFACT_CHANNEL" == "release" ]]; then
              gh release create "$ARTIFACT_ID" \
                --verify-tag \
                --draft \
                --generate-notes \
                --title "HyperFileLens $ARTIFACT_ID"
            else
              gh release create "$ARTIFACT_ID" \
                --target "$GITHUB_SHA" \
                --draft \
                --prerelease \
                --title "Main ${GITHUB_SHA:0:7}"
            fi
            echo "build_required=true" >> "$GITHUB_OUTPUT"
          fi

  quality:
    if: ${{ needs.prepare.outputs.build_required == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: prepare
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hyperfilelens
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hyperfilelens"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/hyperfilelens
      REDIS_URL: redis://127.0.0.1:6379/0
      CELERY_BROKER_URL: redis://127.0.0.1:6379/0
      CACHE_REDIS_URL: redis://127.0.0.1:6379/1
      SECRET_KEY: ci-only-secret-key-with-at-least-32-bytes
      DJANGO_DEBUG: "true"
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: src/agent/go.mod
          cache-dependency-path: src/agent/go.sum
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.10.2"
          enable-cache: true

      - name: Release and source checks
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/quality/check-english-source.py
          python3 -m unittest tools/quality/test_check_english_source.py
          python3 -m unittest tools/quality/test_agent_certification_gate.py
          uv run --isolated --no-project --python 3.8 python tools/quality/check-python38-runtime.py
          ./tools/quality/check-release-contracts.sh
          ./tools/quality/test-default-certificates.sh
          ./tools/quality/test-gateway-bootstrap-health.sh
          ./tools/quality/test-platform-gateway-auto-deploy.sh
          ./tools/quality/test-agent-gateway-uninstall.sh
          ./tools/quality/test-installer-image-refresh.sh
          ./tools/quality/test-docker-image-digest-alias.sh
          ./tools/quality/test-offline-docker-package-plan.sh
          ./tools/quality/test-upgrade-backup-retention.sh
          ./tools/quality/test-main-channel-contracts.sh
          ./tools/quality/test-shared-host-guard.sh
          ./tools/quality/test-release-download-proxy.sh
          ./tools/quality/test-deployment-optional-config.sh
          ./tools/quality/test-payload-tree-hash.sh
          ./tools/quality/test-ci-release-assembly.sh
          HFL_TEST_VERSION=main-0123456 ./tools/quality/test-ci-release-assembly.sh
          ./tools/quality/test-kopia-build-config.sh
          git diff --check
          while IFS= read -r script; do bash -n "$script"; done < <(find . -path './build' -prune -o -path './data' -prune -o -type f -name '*.sh' -print)

      - name: Backend checks
        shell: bash
        run: |
          set -euo pipefail
          uv sync --locked --group dev
          uv run ruff check src/backend
          uv run python src/backend/manage.py test

      - name: Frontend checks
        working-directory: src/frontend
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run lint
          npm run test:ci
          npm run build

      - name: Agent checks
        working-directory: src/agent
        run: go test ./...

  build-hfl-images:
    if: ${{ needs.prepare.outputs.build_required == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    needs: [prepare, quality]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: hfl-backend
            repository: hyperfilelens-backend
            context: .
            dockerfile: deploy/docker/backend.Dockerfile
            cache_scope: hfl-backend
            needs_kopia: true
          - component: hfl-frontend
            repository: hyperfilelens-frontend
            context: .
            dockerfile: deploy/docker/frontend.Dockerfile
            cache_scope: hfl-frontend
            needs_kopia: false
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        if: matrix.needs_kopia
        with:
          go-version-file: src/agent/go.mod
          cache: false
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Prepare pinned Kopia binary
        if: matrix.needs_kopia
        run: ./tools/kopia/prepare.sh --matrix linux:amd64

      - name: Build and push image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ env.REGISTRY_PREFIX }}/${{ matrix.repository }}:${{ needs.prepare.outputs.version }}
          build-args: |
            KOPIA_BINARY=build/kopia/dist/linux/amd64/kopia
            IMAGE_VERSION=${{ needs.prepare.outputs.version }}
            IMAGE_REVISION=${{ needs.prepare.outputs.commit }}
            PIP_TIMEOUT=600
            SENTRY_ENABLED=false
            SENTRY_ENVIRONMENT=production
            SENTRY_RELEASE=${{ needs.prepare.outputs.tag }}
            SENTRY_TRACES_SAMPLE_RATE=0
            SENTRY_SEND_DEFAULT_PII=false
            VITE_SHOW_EULA=false
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,scope=${{ matrix.cache_scope }},mode=min

      - name: Upload immutable image metadata
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_REF: ${{ env.REGISTRY_PREFIX }}/${{ matrix.repository }}:${{ needs.prepare.outputs.version }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          output="_internal-${{ matrix.component }}.json"
          ./release/ci/write-image-metadata.sh \
            "${{ matrix.component }}" "$IMAGE_REF" "$IMAGE_DIGEST" "$output"
          gh release upload "${{ needs.prepare.outputs.tag }}" "$output" --clobber

      - name: Disk report
        if: always()
        run: |
          df -h
          docker system df || true

  build-sourcelens-images:
    if: ${{ needs.prepare.outputs.build_required == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    needs: [prepare, quality]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        component: [backend, frontend, lensnode]
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push bundled SourceLens component
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          ./release/ci/build-sourcelens-image.sh \
            "${{ matrix.component }}" \
            "$REGISTRY_PREFIX" \
            "${{ needs.prepare.outputs.version }}" \
            "_internal-sourcelens-${{ matrix.component }}.json"

      - name: Upload immutable image metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.prepare.outputs.tag }}" \
            "_internal-sourcelens-${{ matrix.component }}.json" --clobber

      - name: Disk report and cleanup
        if: always()
        run: |
          df -h
          docker system df || true
          docker builder prune -af || true

  build-agent:
    if: ${{ needs.prepare.outputs.build_required == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: [prepare, quality]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux:amd64
            asset: linux-amd64
          - target: linux:arm64
            asset: linux-arm64
          - target: darwin:amd64
            asset: darwin-amd64
          - target: darwin:arm64
            asset: darwin-arm64
          - target: windows:amd64
            asset: windows-amd64
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: src/agent/go.mod
          cache-dependency-path: src/agent/go.sum
      - name: Build Agent asset
        env:
          GITHUB_TOKEN: ${{ github.token }}
          APT_MIRROR: ${{ vars.CI_UBUNTU_APT_MIRROR }}
        run: |
          ./release/ci/build-agent-asset.sh \
            "${{ matrix.target }}" \
            "${{ needs.prepare.outputs.version }}" \
            "${{ needs.prepare.outputs.commit }}" \
            "_internal-agent-${{ matrix.asset }}.tar"
      - name: Upload Agent asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.prepare.outputs.tag }}" \
            "_internal-agent-${{ matrix.asset }}.tar" --clobber

  certify-source-host:
    if: ${{ needs.prepare.outputs.build_required == 'true' }}
    name: Certify Source Host (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    needs: [prepare, build-agent]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux:amd64
            platform: linux
            arch: amd64
            asset: linux-amd64
            runner: ubuntu-24.04
          - target: linux:arm64
            platform: linux
            arch: arm64
            asset: linux-arm64
            runner: ubuntu-24.04-arm
          - target: darwin:amd64
            platform: darwin
            arch: amd64
            asset: darwin-amd64
            runner: macos-15-intel
          - target: darwin:arm64
            platform: darwin
            arch: arm64
            asset: darwin-arm64
            runner: macos-15
          - target: windows:amd64
            platform: windows
            arch: amd64
            asset: windows-amd64
            runner: windows-2022
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Download immutable Agent candidate
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: >-
          gh release download "${{ needs.prepare.outputs.tag }}"
          --pattern "_internal-agent-${{ matrix.asset }}.tar"
          --dir build/agent-candidate
      - name: Run native Source Host certification
        shell: bash
        run: >-
          python release/ci/certify-agent-candidate.py
          --internal-bundle "build/agent-candidate/_internal-agent-${{ matrix.asset }}.tar"
          --version "${{ needs.prepare.outputs.version }}"
          --commit "${{ needs.prepare.outputs.commit }}"
          --expected-platform "${{ matrix.platform }}"
          --expected-arch "${{ matrix.arch }}"
          --report "build/certification/_internal-agent-cert-${{ matrix.asset }}.json"
      - name: Verify Ubuntu Agent bundles offline
        if: ${{ matrix.target == 'linux:amd64' }}
        shell: bash
        run: |
          set -euo pipefail
          for ubuntu_release in 20.04 22.04 24.04; do
            ./release/ci/verify-ubuntu-agent-bundle.sh \
              "build/agent-candidate/_internal-agent-${{ matrix.asset }}.tar" \
              "${{ needs.prepare.outputs.version }}" \
              "$ubuntu_release"
          done
      - name: Upload certification evidence
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          report="build/certification/_internal-agent-cert-${{ matrix.asset }}.json"
          if [[ -s "$report" ]]; then
            gh release upload "${{ needs.prepare.outputs.tag }}" "$report" --clobber
          fi

  agent-release-gate:
    if: ${{ needs.prepare.outputs.build_required == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [prepare, certify-source-host]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Download Agent candidates and certification evidence
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p build/agent-candidates build/certification
          gh release download "${{ needs.prepare.outputs.tag }}" \
            --pattern '_internal-agent-*.tar' \
            --dir build/agent-candidates
          gh release download "${{ needs.prepare.outputs.tag }}" \
            --pattern '_internal-agent-cert-*.json' \
            --dir build/certification
      - name: Enforce Source Host release gate
        run: |
          python3 release/ci/verify-agent-certifications.py \
            --candidates-dir build/agent-candidates \
            --reports-dir build/certification \
            --version "${{ needs.prepare.outputs.version }}" \
            --commit "${{ needs.prepare.outputs.commit }}" \
            --required-target linux:amd64 \
            --required-target linux:arm64 \
            --required-target darwin:amd64 \
            --required-target darwin:arm64 \
            --required-target windows:amd64 \
            --output build/certification/_internal-agent-certification-summary.json
      - name: Upload certification summary
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release upload "${{ needs.prepare.outputs.tag }}"
          build/certification/_internal-agent-certification-summary.json --clobber

  build-host-debs:
    if: ${{ needs.prepare.outputs.build_required == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: [prepare, quality]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - ubuntu_release: "20.04"
            asset: ubuntu2004
          - ubuntu_release: "22.04"
            asset: ubuntu2204
          - ubuntu_release: "24.04"
            asset: ubuntu2404
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - name: Build host dependency asset
        env:
          APT_MIRROR: ${{ vars.CI_UBUNTU_APT_MIRROR }}
        run: >-
          ./release/ci/build-host-debs-asset.sh
          "${{ matrix.ubuntu_release }}"
          "_internal-host-debs-${{ matrix.asset }}.tar"
      - name: Verify host dependencies install offline
        run: >-
          ./release/ci/verify-host-debs-asset.sh
          "${{ matrix.ubuntu_release }}"
          "_internal-host-debs-${{ matrix.asset }}.tar"
      - name: Upload host dependency asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release upload "${{ needs.prepare.outputs.tag }}"
          "_internal-host-debs-${{ matrix.asset }}.tar" --clobber

  export-hfl-images:
    if: ${{ needs.prepare.outputs.build_required == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: [prepare, build-hfl-images]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Download image metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p build/ci-metadata
          gh release download "${{ needs.prepare.outputs.tag }}" --pattern '_internal-hfl-*.json' --dir build/ci-metadata
          for file in build/ci-metadata/_internal-*.json; do mv "$file" "${file/_internal-/}"; done
      - name: Export offline HFL archive
        run: |
          ./release/ci/export-hfl-images.sh \
            build/ci-metadata \
            "${{ needs.prepare.outputs.version }}" \
            _internal-hfl-images.tar
      - name: Upload offline HFL archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.prepare.outputs.tag }}" _internal-hfl-images.tar --clobber

  export-sourcelens-bundle:
    if: ${{ needs.prepare.outputs.build_required == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    needs: [prepare, build-sourcelens-images]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Download image metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p build/ci-metadata
          gh release download "${{ needs.prepare.outputs.tag }}" --pattern '_internal-sourcelens-*.json' --dir build/ci-metadata
          for file in build/ci-metadata/_internal-*.json; do mv "$file" "${file/_internal-/}"; done
      - name: Export bundled SourceLens runtime
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          ./release/ci/export-sourcelens-bundle.sh \
            build/ci-metadata \
            "${{ needs.prepare.outputs.version }}" \
            _internal-sourcelens-bundle.tar
      - name: Upload bundled SourceLens runtime
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.prepare.outputs.tag }}" _internal-sourcelens-bundle.tar --clobber

  export-runtime-images:
    if: ${{ needs.prepare.outputs.build_required == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: [prepare, quality]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - run: ./release/ci/export-runtime-images.sh _internal-runtime-images.tar
      - name: Upload runtime images
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.prepare.outputs.tag }}" _internal-runtime-images.tar --clobber

  assemble-release:
    if: ${{ needs.prepare.outputs.build_required == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    needs:
      - prepare
      - build-agent
      - agent-release-gate
      - build-host-debs
      - export-hfl-images
      - export-sourcelens-bundle
      - export-runtime-images
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - name: Download matrix bundles
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p build/ci-input
          gh release download "${{ needs.prepare.outputs.tag }}" --pattern '_internal-*.tar' --dir build/ci-input
      - name: Assemble canonical offline release
        run: |
          ./release/ci/assemble-release.sh \
            --input-dir build/ci-input \
            --version "${{ needs.prepare.outputs.version }}" \
            --commit "${{ needs.prepare.outputs.commit }}"
      - name: Upload final assets to draft release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r asset; do
            [[ -n "$asset" ]] || continue
            gh release delete-asset "${{ needs.prepare.outputs.tag }}" "$asset" --yes
          done < <(gh release view "${{ needs.prepare.outputs.tag }}" --json assets \
            --jq '.assets[] | select(.name | startswith("_internal-") | not) | .name')
          while IFS= read -r asset; do
            gh release upload "${{ needs.prepare.outputs.tag }}" \
              "build/release/dist/${asset}" --clobber
          done < build/release/release-assets.txt
      - name: Disk report
        if: always()
        run: df -h

  verify-release:
    if: ${{ needs.prepare.outputs.build_required == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    needs: [prepare, assemble-release]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - name: Reclaim unused runner toolchains
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          docker system prune -af || true
          df -h
      - name: Download public release candidates from draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p build/release-candidate
          gh release download "${{ needs.prepare.outputs.tag }}" \
            --pattern 'hyperfilelens-*.tar.gz*' \
            --pattern 'SHA256SUMS' \
            --pattern 'MANIFEST.json' \
            --pattern 'SBOM.spdx.json' \
            --pattern 'hyperfilelens-root-ca.crt' \
            --pattern 'assemble-release.*' \
            --dir build/release-candidate
      - name: Verify checksums and reconstruct package when split
        id: package
        working-directory: build/release-candidate
        shell: bash
        run: |
          set -euo pipefail
          sha256sum -c SHA256SUMS
          archive="$(awk '$2 ~ /^hyperfilelens-.*\.tar\.gz$/ { print $2; exit }' SHA256SUMS)"
          if [[ -z "$archive" ]]; then
            first="$(awk '$2 ~ /^hyperfilelens-.*\.tar\.gz\.part-000$/ { print $2; exit }' SHA256SUMS)"
            [[ -n "$first" ]]
            archive="${first%.part-000}"
            cat "${archive}.part-"* > "$archive"
          else
            [[ -f "$archive" ]]
          fi
          echo "archive=$(realpath "$archive")" >> "$GITHUB_OUTPUT"
      - name: Full offline install and browser login smoke
        run: ./release/ci/verify-release.sh --archive "${{ steps.package.outputs.archive }}" --install
      - name: Capture failed install diagnostics
        if: failure()
        shell: bash
        run: |
          set +e
          if [[ -f /opt/hyperfilelens/docker-compose.yml ]]; then
            sudo docker compose -f /opt/hyperfilelens/docker-compose.yml \
              --env-file /opt/hyperfilelens/.env ps -a
            sudo docker compose -f /opt/hyperfilelens/docker-compose.yml \
              --env-file /opt/hyperfilelens/.env logs --no-color --tail 200
          fi
          if [[ -f /opt/hyperfilelens/sourcelens/docker-compose.yml ]]; then
            sudo docker compose -f /opt/hyperfilelens/sourcelens/docker-compose.yml \
              --env-file /opt/hyperfilelens/data/sourcelens/config/.env ps -a
            sudo docker compose -f /opt/hyperfilelens/sourcelens/docker-compose.yml \
              --env-file /opt/hyperfilelens/data/sourcelens/config/.env logs --no-color --tail 200
          fi
          sudo docker system df
          df -h

  publish-release:
    if: ${{ needs.prepare.outputs.build_required == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [prepare, verify-release]
    permissions:
      contents: write
    steps:
      - name: Remove internal assets and publish release
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_CHANNEL: ${{ needs.prepare.outputs.channel }}
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r asset; do
            [[ -n "$asset" ]] || continue
            gh release delete-asset "${{ needs.prepare.outputs.tag }}" "$asset" \
              --repo "${GITHUB_REPOSITORY}" --yes
          done < <(gh release view "${{ needs.prepare.outputs.tag }}" \
            --repo "${GITHUB_REPOSITORY}" --json assets \
            --jq '.assets[] | select(.name | startswith("_internal-")) | .name')
          if [[ "$ARTIFACT_CHANNEL" == "main" ]]; then
            gh release edit "${{ needs.prepare.outputs.tag }}" \
              --repo "${GITHUB_REPOSITORY}" --draft=false --prerelease
          else
            gh release edit "${{ needs.prepare.outputs.tag }}" \
              --repo "${GITHUB_REPOSITORY}" --draft=false --latest
          fi

  deploy-test:
    needs: [prepare, publish-release]
    if: >-
      ${{
        always() &&
        needs.prepare.outputs.channel == 'main' &&
        vars.TEST_DEPLOY_ENABLED == 'true' &&
        needs.prepare.result == 'success' &&
        (
          needs.publish-release.result == 'success' ||
          (
            needs.prepare.outputs.build_required == 'false' &&
            needs.publish-release.result == 'skipped'
          )
        )
      }}
    uses: ./.github/workflows/deploy_target.yml
    with:
      target: test
      channel: main
      tag: ${{ needs.prepare.outputs.tag }}
      public_url: ${{ vars.TEST_PUBLIC_URL }}
      release_download_proxy_url: ${{ vars.TEST_RELEASE_DOWNLOAD_PROXY_URL }}
      ssh_host: ${{ vars.TEST_SSH_HOST }}
      ssh_port: ${{ vars.TEST_SSH_PORT }}
      ssh_user: ${{ vars.TEST_SSH_USER }}
      ssh_known_hosts: ${{ vars.TEST_SSH_KNOWN_HOSTS }}
      turnstile_site_key: ${{ vars.TEST_TURNSTILE_SITE_KEY }}
      turnstile_enabled: ${{ vars.TEST_TURNSTILE_ENABLED == 'true' }}
      platform_gateway_auto_deploy: ${{ vars.TEST_PLATFORM_GATEWAY_AUTO_DEPLOY == 'true' }}
      smtp_host: ${{ vars.TEST_SMTP_HOST }}
      smtp_port: ${{ vars.TEST_SMTP_PORT }}
      smtp_username: ${{ vars.TEST_SMTP_USERNAME }}
      smtp_security: ${{ vars.TEST_SMTP_SECURITY }}
      email_from: ${{ vars.TEST_EMAIL_FROM }}
      ai_model_provider: ${{ vars.TEST_AI_MODEL_PROVIDER }}
      ai_model_id: ${{ vars.TEST_AI_MODEL_ID }}
      ai_model_display_name: ${{ vars.TEST_AI_MODEL_DISPLAY_NAME }}
    secrets:
      ssh_private_key: ${{ secrets.TEST_SSH_PRIVATE_KEY }}
      turnstile_secret_key: ${{ secrets.TEST_TURNSTILE_SECRET_KEY }}
      smtp_password: ${{ secrets.TEST_SMTP_PASSWORD }}
      ai_model_api_base: ${{ secrets.TEST_AI_MODEL_API_BASE }}
      ai_model_api_key: ${{ secrets.TEST_AI_MODEL_API_KEY }}

  deploy-preprod:
    needs: [prepare, publish-release]
    if: >-
      ${{
        always() &&
        needs.prepare.outputs.channel == 'release' &&
        vars.PREPROD_DEPLOY_ENABLED == 'true' &&
        needs.prepare.result == 'success' &&
        needs.publish-release.result == 'success'
      }}
    uses: ./.github/workflows/deploy_target.yml
    with:
      target: preprod
      channel: release
      tag: ${{ needs.prepare.outputs.tag }}
      public_url: ${{ vars.PREPROD_PUBLIC_URL }}
      release_download_proxy_url: ${{ vars.PREPROD_RELEASE_DOWNLOAD_PROXY_URL }}
      ssh_host: ${{ vars.PREPROD_SSH_HOST }}
      ssh_port: ${{ vars.PREPROD_SSH_PORT }}
      ssh_user: ${{ vars.PREPROD_SSH_USER }}
      ssh_known_hosts: ${{ vars.PREPROD_SSH_KNOWN_HOSTS }}
      turnstile_site_key: ${{ vars.PREPROD_TURNSTILE_SITE_KEY }}
      turnstile_enabled: ${{ vars.PREPROD_TURNSTILE_ENABLED == 'true' }}
      platform_gateway_auto_deploy: ${{ vars.PREPROD_PLATFORM_GATEWAY_AUTO_DEPLOY == 'true' }}
      smtp_host: ${{ vars.PREPROD_SMTP_HOST }}
      smtp_port: ${{ vars.PREPROD_SMTP_PORT }}
      smtp_username: ${{ vars.PREPROD_SMTP_USERNAME }}
      smtp_security: ${{ vars.PREPROD_SMTP_SECURITY }}
      email_from: ${{ vars.PREPROD_EMAIL_FROM }}
      ai_model_provider: ${{ vars.PREPROD_AI_MODEL_PROVIDER }}
      ai_model_id: ${{ vars.PREPROD_AI_MODEL_ID }}
      ai_model_display_name: ${{ vars.PREPROD_AI_MODEL_DISPLAY_NAME }}
    secrets:
      ssh_private_key: ${{ secrets.PREPROD_SSH_PRIVATE_KEY }}
      turnstile_secret_key: ${{ secrets.PREPROD_TURNSTILE_SECRET_KEY }}
      smtp_password: ${{ secrets.PREPROD_SMTP_PASSWORD }}
      ai_model_api_base: ${{ secrets.PREPROD_AI_MODEL_API_BASE }}
      ai_model_api_key: ${{ secrets.PREPROD_AI_MODEL_API_KEY }}

  cleanup-main-builds:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [prepare, publish-release]
    if: >-
      ${{
        always() &&
        needs.prepare.outputs.channel == 'main' &&
        needs.prepare.result == 'success'
      }}
    permissions:
      contents: write
    steps:
      - name: Retain only the current successful Main build
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_ID: ${{ needs.prepare.outputs.tag }}
          BUILD_REQUIRED: ${{ needs.prepare.outputs.build_required }}
          PUBLISH_RESULT: ${{ needs.publish-release.result }}
        shell: bash
        run: |
          set -euo pipefail
          delete_main_artifact() {
            local artifact_id=$1
            if gh release view "$artifact_id" --repo "$GITHUB_REPOSITORY" \
              >/dev/null 2>&1; then
              gh release delete "$artifact_id" --repo "$GITHUB_REPOSITORY" --yes
            fi
            if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${artifact_id}" \
              --silent >/dev/null 2>&1; then
              gh api --method DELETE \
                "repos/${GITHUB_REPOSITORY}/git/refs/tags/${artifact_id}" --silent
            fi
          }

          retained_id="$ARTIFACT_ID"
          if [[ "$PUBLISH_RESULT" != "success" ]] \
            && [[ "$BUILD_REQUIRED" != "false" || "$PUBLISH_RESULT" != "skipped" ]]; then
            if gh release view "$ARTIFACT_ID" --repo "$GITHUB_REPOSITORY" \
              --json isDraft --jq '.isDraft' 2>/dev/null \
              | grep -Fx true >/dev/null; then
              delete_main_artifact "$ARTIFACT_ID"
            fi
            retained_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" --paginate \
              --jq '.[] | select(.draft == false and .prerelease == true and (.tag_name | test("^main-[0-9a-f]{7}$"))) | [.created_at, .tag_name] | @tsv' \
              | sort -r | head -1 | cut -f2)"
          fi

          gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" --paginate \
            --jq '.[] | select(.tag_name | test("^main-[0-9a-f]{7}$")) | .tag_name' \
            > "$RUNNER_TEMP/all-main-builds.txt"
          : > "$RUNNER_TEMP/expired-main-builds.txt"
          while IFS= read -r artifact_id; do
            [[ -n "$artifact_id" && "$artifact_id" != "$retained_id" ]] || continue
            printf '%s\n' "$artifact_id" >> "$RUNNER_TEMP/expired-main-builds.txt"
          done < "$RUNNER_TEMP/all-main-builds.txt"
          while IFS= read -r artifact_id; do
            [[ -n "$artifact_id" ]] || continue
            delete_main_artifact "$artifact_id"
          done < "$RUNNER_TEMP/expired-main-builds.txt"
